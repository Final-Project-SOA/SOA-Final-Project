syntax = "proto3";

package appointment;

service AppointmentService {
    rpc GetAppointments (Empty) returns (AppointmentList);
    rpc CreateAppointment (Appointment) returns (Appointment);
    rpc UpdateAppointment (Appointment) returns (Appointment);
    rpc DeleteAppointment (AppointmentId) returns (DeleteResponse);
    rpc SearchAppointments (SearchAppointmentRequest) returns (AppointmentList);
}

message Empty {}

message Appointment {
    int64 id = 1;
    int32 patientId = 2;
    string doctor = 3;
    string date = 4;
}

message AppointmentId {
    int64 id = 1;
}

message SearchAppointmentRequest {
    string keyword = 1;
}

message AppointmentList {
    repeated Appointment appointments = 1;
}

message DeleteResponse {
    bool success = 1;
    string message = 2;
}