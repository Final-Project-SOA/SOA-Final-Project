syntax = "proto3";

package appointment;

service AppointmentService {

  rpc GetAppointments (Empty)
      returns (AppointmentList);

  rpc CreateAppointment (AppointmentRequest)
      returns (AppointmentResponse);
}

message Empty {}

message AppointmentRequest {
  int32 patientId = 1;
  string doctor = 2;
  string date = 3;
}

message AppointmentResponse {
  int32 id = 1;
  int32 patientId = 2;
  string doctor = 3;
  string date = 4;
}

message Appointment {
  int32 id = 1;
  string doctor = 2;
}

message AppointmentList {
  repeated AppointmentResponse appointments = 1;
}