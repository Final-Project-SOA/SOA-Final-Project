syntax = "proto3";

package patient;

service PatientService {

  rpc GetPatients (Empty) returns (PatientList);

  rpc AddPatient (PatientRequest)
      returns (PatientResponse);
}

message Empty {}

message PatientRequest {
  string name = 1;
  int32 age = 2;
  string disease = 3;
}

message PatientResponse {
  int32 id = 1;
  string name = 2;
  int32 age = 3;
  string disease = 4;
}

message PatientList {
  repeated PatientResponse patients = 1;
}